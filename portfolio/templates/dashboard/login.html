{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body>
<div class="login-wrapper">
  <div class="login-box">
    <div class="login-brand">admin@portfolio:~$</div>
    <h1>Admin Panel</h1>
    <div class="sub">Log in to manage your portfolio content.</div>

    {% if form.non_field_errors %}
      <div class="alert alert-error">{{ form.non_field_errors.0 }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" class="form-control" autofocus required>
      </div>
      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>
  </div>
</div>
</body>
</html>
